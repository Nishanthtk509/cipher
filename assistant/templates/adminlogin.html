<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Cipher AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-[radial-gradient(circle_at_top,_#0f2a43_0%,_#020617_60%)] flex items-center justify-center p-4">

    <div class="w-full max-w-md">

        <div class="bg-white/10 backdrop-blur-xl border border-white/10 rounded-3xl p-8 shadow-2xl">

            <!-- Logo -->
            <div class="text-center mb-8">

                <div class="w-20 h-20 mx-auto mb-4 rounded-full bg-blue-500/20 flex items-center justify-center border border-blue-400/20">
                    <span class="text-4xl">🛡️</span>
                </div>

                <h1 class="text-4xl font-bold text-white">
                    Admin Portal
                </h1>

                <p class="text-slate-400 mt-2">
                    Cipher AI Administration
                </p>

            </div>

            <!-- Error Message -->
            {% if error %}
            <div class="mb-5 bg-red-500/20 border border-red-400/30 text-red-200 px-4 py-3 rounded-xl">
                {{ error }}
            </div>
            {% endif %}

            <!-- Login Form -->
            <form method="POST" class="space-y-5">

                {% csrf_token %}

                <div>
                    <label class="block text-slate-300 mb-2">
                        Username
                    </label>

                    <input
                        type="text"
                        name="username"
                        placeholder="Enter admin username"
                        required
                        class="w-full px-4 py-3 bg-white/10 border border-white/10 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label class="block text-slate-300 mb-2">
                        Password
                    </label>

                    <input
                        type="password"
                        name="password"
                        placeholder="Enter password"
                        required
                        class="w-full px-4 py-3 bg-white/10 border border-white/10 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <button
                    type="submit"
                    class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl transition duration-300">
                    Login as Admin
                </button>

            </form>

            <!-- Footer -->
            <div class="mt-8 text-center">

                <p class="text-slate-500 text-sm">
                    Authorized Personnel Only
                </p>

                <a
                    href="{% url 'login' %}"
                    class="inline-block mt-3 text-blue-400 hover:text-blue-300 text-sm">
                    ← Back to User Login
                </a>

            </div>

        </div>

    </div>

</body>

</html>
