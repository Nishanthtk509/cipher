<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-600 via-purple-500 to-pink-500 flex items-center justify-center p-5">

    <div class="w-full max-w-md">
        <div class="backdrop-blur-lg bg-white/10 border border-white/20 rounded-3xl p-8 shadow-2xl">

            <!-- Heading -->
            <div class="text-center mb-8">
                <h1 class="text-4xl font-bold text-white">Welcome Back</h1>
                <p class="text-white/70 mt-2">Sign in to your account</p>
            </div>

            <!-- Form -->
            <form class="space-y-5">

                <!-- Email -->
                <div>
                    <label class="block text-white mb-2">Email</label>
                    <input
                        type="email"
                        placeholder="Enter your email"
                        class="w-full px-4 py-3 rounded-xl bg-white/20 border border-white/20 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-white"
                    >
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-white mb-2">Password</label>
                    <input
                        type="password"
                        placeholder="Enter your password"
                        class="w-full px-4 py-3 rounded-xl bg-white/20 border border-white/20 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-white"
                    >
                </div>

                <!-- Remember Me -->
                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center gap-2 text-white">
                        <input type="checkbox" class="rounded">
                        Remember me
                    </label>

                    <a href="#" class="text-white hover:text-gray-200">
                        Forgot Password?
                    </a>
                </div>

                <!-- Button -->
                <button
                    type="submit"
                    class="w-full py-3 rounded-xl bg-white text-indigo-600 font-semibold hover:bg-gray-100 transition duration-300"
                >
                    Sign In
                </button>

            </form>

            <!-- Divider -->
            <div class="flex items-center my-6">
                <div class="flex-1 h-px bg-white/20"></div>
                <span class="px-4 text-white/70 text-sm">OR</span>
                <div class="flex-1 h-px bg-white/20"></div>
            </div>

            <!-- Social Login -->
            <div class="grid grid-cols-2 gap-4">
                <button class="py-3 rounded-xl bg-white/10 border border-white/20 text-white hover:bg-white/20 transition">
                    Google
                </button>

                <button class="py-3 rounded-xl bg-white/10 border border-white/20 text-white hover:bg-white/20 transition">
                    GitHub
                </button>
            </div>

            <!-- Signup -->
            <p class="text-center text-white/70 mt-6">
                Don't have an account?
                <a href="#" class="text-white font-semibold hover:underline">
                    Sign Up
                </a>
            </p>

        </div>
    </div>

</body>
</html>
