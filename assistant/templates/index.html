<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cipher AI Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-[radial-gradient(circle_at_top,_#0f2a43_0%,_#020617_60%)]">

<!-- Main Content -->
<div class="max-w-4xl mx-auto px-4 pt-10 pb-40">

    <!-- Header -->
    <div class="text-center mb-10">

        <div class="inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-blue-500/20 backdrop-blur-lg border border-blue-500/20 mb-5">
            <span class="text-4xl">🤖</span>
        </div>

        <h1 class="text-5xl font-bold text-white">
            Cipher AI
        </h1>

        <p class="text-slate-400 mt-3">
            Ask questions from your knowledge base
        </p>

        <div
            id="voice-status"
            class="mt-5 text-green-400 font-medium"
        >
            Click anywhere to activate voice assistant
        </div>

    </div>

    <!-- AI Response -->
    {% if answer %}
    <div class="bg-white/10 backdrop-blur-xl border border-white/10 rounded-3xl p-8 shadow-xl animate-fadeIn">

        <div class="flex items-center gap-3 mb-5">

            <div class="w-12 h-12 rounded-xl bg-green-500/20 flex items-center justify-center">
                <span class="text-xl">✨</span>
            </div>

            <div>
                <h2 class="text-white text-xl font-semibold">
                    AI Response
                </h2>

                <p class="text-slate-400 text-sm">
                    Generated from your knowledge base
                </p>
            </div>

        </div>

        <div class="border-t border-white/10 pt-5">

            <p class="text-slate-200 whitespace-pre-line leading-8">
                {{ answer }}
            </p>

        </div>

    </div>
    {% endif %}

</div>

<!-- Fixed Bottom Input -->
<div class="fixed bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-[#020617] via-[#020617]/95 to-transparent">

    <div class="max-w-4xl mx-auto">

        <form
            method="POST"
            id="chatForm"
            class="bg-white/10 backdrop-blur-xl border border-white/10 rounded-3xl p-3 flex gap-3 shadow-2xl"
        >

            {% csrf_token %}

            <input
                type="text"
                name="question"
                id="questionInput"
                placeholder="Speak or type your question..."
                class="flex-1 bg-transparent px-4 py-3 text-white placeholder-slate-400 focus:outline-none"
                required
            >

            <button
                type="submit"
                class="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl transition"
            >
                Ask
            </button>

        </form>

    </div>

</div>

<!-- Voice + Speech Script (single unified block) -->
<script>

    // ── State ──────────────────────────────────────────────
    let isListening = false;
    let micPermissionGranted = false;

    const statusEl = () => document.getElementById("voice-status");

    // ── Speech Synthesis ───────────────────────────────────
    function speakAnswer(text) {

        if (!text) return;

        window.speechSynthesis.cancel();

        const speech = new SpeechSynthesisUtterance(text);
        speech.rate  = 1;
        speech.pitch = 1.1;
        speech.volume = 1;

        // Pick a female voice if available
        const pickVoice = () => {
            const voices = window.speechSynthesis.getVoices();
            return voices.find(v =>
                /female|zira|susan|samantha|victoria|karen|hazel|aria/i.test(v.name)
            );
        };

        const voice = pickVoice();
        if (voice) speech.voice = voice;

        speech.onstart = () => {
            if (window.recognition) window.recognition.stop();
            statusEl().innerText = "🔊 Speaking...";
        };

        speech.onend = () => {
            statusEl().innerText = "🎤 Listening...";
            startListening();
        };

        speech.onerror = () => {
            statusEl().innerText = "Click anywhere to activate voice assistant";
        };

        window.speechSynthesis.speak(speech);
    }

    // Wait for voices to load then speak the answer (if any)
    const answerText = `{{ answer|escapejs }}`;

    if (answerText) {
        if (window.speechSynthesis.getVoices().length) {
            speakAnswer(answerText);
        } else {
            window.speechSynthesis.onvoiceschanged = () => speakAnswer(answerText);
        }
    }

    // ── Speech Recognition ─────────────────────────────────
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {

        statusEl().innerText = "⚠️ Voice only works in Chrome — please switch browsers";

    } else {

        const recognition = new SpeechRecognition();
        window.recognition = recognition;

        recognition.continuous     = false;
        recognition.interimResults = false;
        recognition.lang           = 'en-US';

        // ── Start listening ──
        window.startListening = function () {
            if (isListening || window.speechSynthesis.speaking) return;
            try {
                recognition.start();
                isListening = true;
            } catch (e) {
                isListening = false;
            }
        };

        recognition.onstart = () => {
            isListening = true;
            statusEl().innerText = "🎤 Listening...";
        };

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            document.getElementById("questionInput").value = transcript;
            statusEl().innerText = "✅ Got it! Sending...";
            document.getElementById("chatForm").submit();
        };

        recognition.onerror = (event) => {
            isListening = false;
            const messages = {
                'not-allowed' : "❌ Mic blocked — allow mic in your browser settings",
                'network'     : "❌ Network error — Chrome needs internet for speech API",
                'no-speech'   : "🎤 No speech detected — click to try again",
                'aborted'     : "🎤 Cancelled — click to try again",
            };
            statusEl().innerText = messages[event.error] || "❌ Error: " + event.error;
        };

        recognition.onend = () => {
            isListening = false;
            if (!window.speechSynthesis.speaking) {
                statusEl().innerText = "Click anywhere to activate voice assistant";
            }
        };

        // ── Click to activate ──
        // Explicitly request mic permission first (required on HTTPS / Render)
        document.addEventListener("click", async (e) => {

            // Don't intercept the form submit button
            if (e.target.closest("button[type='submit']")) return;

            if (window.speechSynthesis.speaking || isListening) return;

            if (!micPermissionGranted) {
                try {
                    await navigator.mediaDevices.getUserMedia({ audio: true });
                    micPermissionGranted = true;
                } catch (err) {
                    statusEl().innerText = "❌ Mic permission denied — allow it in browser settings";
                    return;
                }
            }

            startListening();
        });

    }

</script>

<style>

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.animate-fadeIn {
    animation: fadeIn .5s ease;
}

</style>

</body>
</html>
