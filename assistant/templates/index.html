<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cipher AI Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-[radial-gradient(circle_at_top,_#0f2a43_0%,_#020617_60%)]">

<!-- Main Content -->
<div class="max-w-4xl mx-auto px-4 pt-10 pb-40">

    <!-- Header -->
    <div class="text-center mb-10">

        <div class="inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-blue-500/20 backdrop-blur-lg border border-blue-500/20 mb-5">
            <span class="text-4xl">🤖</span>
        </div>

        <h1 class="text-5xl font-bold text-white">
            Cipher AI
        </h1>

        <p class="text-slate-400 mt-3">
            Ask questions from your knowledge base
        </p>

        <div
            id="voice-status"
            class="mt-5 text-green-400 font-medium"
        >
            🎤 Starting mic...
        </div>

    </div>

    <!-- AI Response -->
    {% if answer %}
    <div class="bg-white/10 backdrop-blur-xl border border-white/10 rounded-3xl p-8 shadow-xl animate-fadeIn">

        <div class="flex items-center gap-3 mb-5">

            <div class="w-12 h-12 rounded-xl bg-green-500/20 flex items-center justify-center">
                <span class="text-xl">✨</span>
            </div>

            <div>
                <h2 class="text-white text-xl font-semibold">
                    AI Response
                </h2>

                <p class="text-slate-400 text-sm">
                    Generated from your knowledge base
                </p>
            </div>

        </div>

        <div class="border-t border-white/10 pt-5">

            <p class="text-slate-200 whitespace-pre-line leading-8">
                {{ answer }}
            </p>

        </div>

    </div>
    {% endif %}

</div>

<!-- Fixed Bottom Input -->
<div class="fixed bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-[#020617] via-[#020617]/95 to-transparent">

    <div class="max-w-4xl mx-auto">

        <form
            method="POST"
            id="chatForm"
            class="bg-white/10 backdrop-blur-xl border border-white/10 rounded-3xl p-3 flex gap-3 shadow-2xl"
        >

            {% csrf_token %}

            <input
                type="text"
                name="question"
                id="questionInput"
                placeholder="Listening... or type your question"
                class="flex-1 bg-transparent px-4 py-3 text-white placeholder-slate-400 focus:outline-none"
            >

            <button
                type="submit"
                class="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl transition"
            >
                Ask
            </button>

        </form>

    </div>

</div>

<script>

    const statusEl  = () => document.getElementById("voice-status");
    const input     = document.getElementById("questionInput");
    const form      = document.getElementById("chatForm");

    let isListening = false;
    let isSpeaking  = false;

    // ── Speech Recognition Setup ───────────────────────────
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        statusEl().innerText = "⚠️ Use Chrome for voice support";
    }

    const recognition = SpeechRecognition ? new SpeechRecognition() : null;

    if (recognition) {

        recognition.continuous     = false;
        recognition.interimResults = true;  // show words as they come in
        recognition.lang           = "en-US";

        recognition.onstart = () => {
            isListening          = true;
            statusEl().innerText = "🎤 Listening...";
        };

        // Show interim results in input box as user speaks
        recognition.onresult = (event) => {
            let interim = "";
            let final   = "";

            for (let i = event.resultIndex; i < event.results.length; i++) {
                const t = event.results[i][0].transcript;
                if (event.results[i].isFinal) {
                    final += t;
                } else {
                    interim += t;
                }
            }

            // Print to input box live
            input.value = final || interim;

            if (final) {
                statusEl().innerText = "✅ Got: " + final;
                input.removeAttribute("required");
                setTimeout(() => form.submit(), 800);
            }
        };

        recognition.onerror = (event) => {
            isListening = false;

            if (event.error === "not-allowed") {
                statusEl().innerText = "❌ Mic blocked — allow mic in Chrome settings";
                return; // don't restart if permission denied
            }

            // For all other errors, restart after a short delay
            statusEl().innerText = "⚠️ " + event.error + " — restarting...";
            setTimeout(() => startListening(), 1000);
        };

        recognition.onend = () => {
            isListening = false;

            // Auto restart unless speaking or tab is hidden
            if (!isSpeaking && !document.hidden) {
                setTimeout(() => startListening(), 300);
            }
        };
    }

    // ── Start Listening ────────────────────────────────────
    function startListening() {
        if (!recognition || isListening || isSpeaking || document.hidden) return;
        try {
            recognition.start();
        } catch (e) {
            // already started — ignore
        }
    }

    // Restart mic when tab becomes visible again
    document.addEventListener("visibilitychange", () => {
        if (!document.hidden && !isSpeaking) {
            setTimeout(() => startListening(), 300);
        }
    });

    // ── Speech Synthesis ───────────────────────────────────
    function speakAnswer(text) {

        if (!text) return;

        window.speechSynthesis.cancel();

        const utter  = new SpeechSynthesisUtterance(text);
        utter.rate   = 1;
        utter.pitch  = 1.1;
        utter.volume = 1;

        const voices   = window.speechSynthesis.getVoices();
        const femVoice = voices.find(v =>
            /female|zira|susan|samantha|victoria|karen|hazel|aria/i.test(v.name)
        );
        if (femVoice) utter.voice = femVoice;

        utter.onstart = () => {
            isSpeaking = true;
            // Stop mic before speaking to avoid feedback
            if (recognition) recognition.abort();
            statusEl().innerText = "🔊 Speaking...";
        };

        utter.onend = () => {
            isSpeaking = false;
            // Wait 500ms after speaking before restarting mic
            setTimeout(() => startListening(), 500);
        };

        utter.onerror = () => {
            isSpeaking = false;
            setTimeout(() => startListening(), 500);
        };

        window.speechSynthesis.speak(utter);
    }

    // ── Init on page load ──────────────────────────────────
    async function init() {

        // Request mic permission on page load
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            stream.getTracks().forEach(t => t.stop()); // release stream, recognition manages its own
        } catch (err) {
            statusEl().innerText = "❌ Mic permission denied — allow it in Chrome settings";
            return;
        }

        const answerText = `{{ answer|escapejs }}`;

        if (answerText) {
            // Speak the answer first, mic restarts after
            if (window.speechSynthesis.getVoices().length) {
                speakAnswer(answerText);
            } else {
                window.speechSynthesis.onvoiceschanged = () => {
                    window.speechSynthesis.onvoiceschanged = null;
                    speakAnswer(answerText);
                };
            }
        } else {
            // No answer — start listening immediately
            startListening();
        }
    }

    init();

</script>

<style>

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.animate-fadeIn {
    animation: fadeIn .5s ease;
}

</style>

</body>
</html>
