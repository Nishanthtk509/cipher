<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cipher AI Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-[radial-gradient(circle_at_top,_#0f2a43_0%,_#020617_60%)]">

```
<!-- Main Content -->
<div class="max-w-4xl mx-auto px-4 pt-10 pb-40">

    <!-- Header -->
    <div class="text-center mb-10">

        <div class="inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-blue-500/20 backdrop-blur-lg border border-blue-500/20 mb-5">
            <span class="text-4xl">🤖</span>
        </div>

        <h1 class="text-5xl font-bold text-white">
            Cipher AI
        </h1>

        <p class="text-slate-400 mt-3">
            Ask questions from your knowledge base
        </p>

        <div
            id="voice-status"
            class="mt-5 text-green-400 font-medium"
        >
            Click anywhere to activate voice assistant
        </div>

    </div>

    <!-- AI Response -->
    {% if answer %}
    <div class="bg-white/10 backdrop-blur-xl border border-white/10 rounded-3xl p-8 shadow-xl animate-fadeIn">

        <div class="flex items-center gap-3 mb-5">

            <div class="w-12 h-12 rounded-xl bg-green-500/20 flex items-center justify-center">
                <span class="text-xl">✨</span>
            </div>

            <div>
                <h2 class="text-white text-xl font-semibold">
                    AI Response
                </h2>

                <p class="text-slate-400 text-sm">
                    Generated from your knowledge base
                </p>
            </div>

        </div>

        <div class="border-t border-white/10 pt-5">

            <p class="text-slate-200 whitespace-pre-line leading-8">
                {{ answer }}
            </p>

        </div>

    </div>
    {% endif %}

</div>

<!-- Fixed Bottom Input -->
<div class="fixed bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-[#020617] via-[#020617]/95 to-transparent">

    <div class="max-w-4xl mx-auto">

        <form
            method="POST"
            id="chatForm"
            class="bg-white/10 backdrop-blur-xl border border-white/10 rounded-3xl p-3 flex gap-3 shadow-2xl"
        >

            {% csrf_token %}

            <input
                type="text"
                name="question"
                id="questionInput"
                placeholder="Speak or type your question..."
                class="flex-1 bg-transparent px-4 py-3 text-white placeholder-slate-400 focus:outline-none"
                required
            >

            <button
                type="submit"
                class="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl transition"
            >
                Ask
            </button>

        </form>

    </div>

</div>

<!-- Answer Speech -->
{% if answer %}
<script>

window.speechSynthesis.cancel();

const answerText =
    `{{ answer|escapejs }}`;

const speech =
    new SpeechSynthesisUtterance(answerText);

speech.rate = 1;
speech.pitch = 1;
speech.volume = 1;

speech.onstart = () => {

    if(window.recognition){
        window.recognition.stop();
    }

    document.getElementById("voice-status")
        .innerText = "🔊 Speaking...";
};

speech.onend = () => {

    document.getElementById("voice-status")
        .innerText = "🎤 Listening...";

    if(window.startListening){
        window.startListening();
    }
};

window.speechSynthesis.speak(speech);

</script>
{% endif %}

<!-- Voice Recognition -->
<script>

window.speechSynthesis.cancel();

function speakAnswer(text){

    const speech = new SpeechSynthesisUtterance(text);

    speech.rate = 1;
    speech.pitch = 1.1;
    speech.volume = 1;

    const voices = window.speechSynthesis.getVoices();

    const femaleVoice = voices.find(v =>
        v.name.toLowerCase().includes("female") ||
        v.name.toLowerCase().includes("zira") ||
        v.name.toLowerCase().includes("susan") ||
        v.name.toLowerCase().includes("samantha") ||
        v.name.toLowerCase().includes("victoria") ||
        v.name.toLowerCase().includes("karen") ||
        v.name.toLowerCase().includes("hazel") ||
        v.name.toLowerCase().includes("aria")
    );

    if(femaleVoice){
        speech.voice = femaleVoice;
    }

    speech.onstart = () => {

        if(window.recognition){
            window.recognition.stop();
        }

        document.getElementById("voice-status")
            .innerText = "🔊 Speaking...";
    };

    speech.onend = () => {

        document.getElementById("voice-status")
            .innerText = "🎤 Listening...";

        if(window.startListening){
            window.startListening();
        }
    };

    window.speechSynthesis.speak(speech);
}

const answer =
`{{ answer|escapejs }}`;

window.speechSynthesis.onvoiceschanged = () => {
    speakAnswer(answer);
};

if(window.speechSynthesis.getVoices().length){
    speakAnswer(answer);
}

</script>

<style>

@keyframes fadeIn {

    from {
        opacity: 0;
        transform: translateY(20px);
    }

    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.animate-fadeIn {
    animation: fadeIn .5s ease;
}

</style>
```

</body>
</html>
